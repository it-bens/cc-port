version: 2

builds:
  - id: cc-port
    main: ./cmd/cc-port
    binary: cc-port
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: cc-port-with-logo
    main: ./cmd/cc-port
    binary: cc-port-with-logo
    flags:
      - -tags=logo
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: cc-port
    ids: [cc-port]
    formats: ["tar.gz"]
    name_template: "cc-port_{{ .Os }}_{{ .Arch }}"
  - id: cc-port-with-logo
    ids: [cc-port-with-logo]
    formats: ["tar.gz"]
    name_template: "cc-port-with-logo_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: cc-port
    ids: [cc-port]
    binaries:
      - cc-port
    homepage: "https://github.com/it-bens/cc-port"
    description: "Claude Code project portability tool"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cc-port"] if OS.mac?
    zap:
      trash:
        - "~/.claude/.cc-port.lock"
    repository:
      owner: it-bens
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
  - name: cc-port-with-logo
    ids: [cc-port-with-logo]
    binaries:
      - cc-port-with-logo
    homepage: "https://github.com/it-bens/cc-port"
    description: "Claude Code project portability tool (with crane logo)"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cc-port-with-logo"] if OS.mac?
    zap:
      trash:
        - "~/.claude/.cc-port.lock"
    repository:
      owner: it-bens
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
