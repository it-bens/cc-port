version: 2

builds:
  - main: ./cmd/cc-port
    binary: cc-port
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: cc-port
    binaries:
      - cc-port
    homepage: "https://github.com/it-bens/cc-port"
    description: "Claude Code project portability tool"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cc-port"] if OS.mac?
    zap:
      trash:
        - "~/.claude/.cc-port.lock"
    repository:
      owner: it-bens
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
