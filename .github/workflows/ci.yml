name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly govulncheck canary; skipped per-PR to keep review noise low.
    - cron: "17 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Integration tests
        run: go test -tags integration -race -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  govulncheck:
    # Scan deps against vuln.go.dev on the weekly cron only. Per-PR runs
    # would surface unreachable-vuln false positives and add review noise;
    # the cron is the canary for newly disclosed advisories hitting pinned
    # deps between pushes.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Scan against the newest 1.26 patch so the canary fails only on
          # genuinely unpatched vulns, not on a toolchain that is a patch behind.
          go-version: "1.26"
          check-latest: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          version: v2.15.4
          args: check

  release-snapshot:
    # Full goreleaser pipeline — build, archive, checksum, cosign sign-blob —
    # without publishing. Catches release-time regressions (e.g. cosign flag
    # changes) before tagging. Skips homebrew so no tap interaction.
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # renovate: datasource=github-releases depName=sigstore/cosign
          cosign-release: "v3.0.6"
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          version: v2.15.4
          args: release --snapshot --clean --skip=publish,homebrew
