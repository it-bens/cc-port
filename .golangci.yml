version: "2"

run:
  build-tags:
    - integration

linters:
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dogsled:
      max-blank-identifiers: 3
    funlen:
      lines: 120
      statements: 60
    gocyclo:
      min-complexity: 20
    lll:
      line-length: 150
    misspell:
      locale: US
    goconst:
      ignore-tests: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
        - opinionated

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/it-bens/cc-port
